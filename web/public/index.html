<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badminton Court Availability</title>
    <link rel="icon" href="/court-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="/court-mark.svg" alt="" />
          <div>
            <h1>Court Availability</h1>
          </div>
        </div>

        <div class="controls" aria-label="Calendar controls">
          <button id="previousWeek" class="icon-button" type="button" title="Previous week" aria-label="Previous week">
            <span aria-hidden="true">‹</span>
          </button>
          <input id="dateInput" class="date-input" type="date" />
          <button id="nextWeek" class="icon-button" type="button" title="Next week" aria-label="Next week">
            <span aria-hidden="true">›</span>
          </button>
          <button id="refreshButton" class="refresh-button" type="button">Refresh</button>
        </div>
      </header>

      <section class="metrics" aria-label="Calendar summary">
        <div>
          <span class="metric-label">Courts</span>
          <strong id="courtCount">-</strong>
        </div>
        <div>
          <span class="metric-label">Location slots</span>
          <strong id="openSlotCount">-</strong>
        </div>
        <div>
          <span class="metric-label">Fetched</span>
          <strong id="fetchedAt">-</strong>
        </div>
      </section>

      <section class="calendar-panel" aria-label="Court booking calendar">
        <div id="status" class="status" role="status">Loading bookings</div>
        <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
          <div class="loading-spinner"></div>
          <span>Refreshing</span>
        </div>
        <div class="calendar-scroll">
          <div id="calendar" class="calendar" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
